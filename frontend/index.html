<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AffichIA</title>
    >
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎨 AffichIA</h1>
        <p class="subtitle">Générateur d'affiches pour événements étudiants</p>

        <div class="form-group">
            abel>Mots-clés de l'événement :</label>
            <input type="text" id="keywords" placeholder="Ex: soirée rétro, tournoi gaming...">
        </div>

        <div class="form-group">
            abel>Type d'événement :</label>
            <select id="style">
                <option value="soiree">Soirée</option>
                <option value="conference">Conférence</option>
                <option value="tournoi">Tournoi</option>
                <option value="atelier">Atelier</option>
            </select>
        </div>

        <div class="form-group">
            abel>Template :</label>
            <div class="template-selector">
                <div class="template-option selected" data-template="1">Style 1</div>
                <div class="template-option" data-template="2">Style 2</div>
                <div class="template-option" data-template="3">Style 3</div>
            </div>
        </div>

        <button id="generateBtn" class="btn">Générer une affiche</button>

        <!-- Prévisualisation de l'affiche -->
        <div id="posterPreview" class="poster-preview hidden">
            <div id="poster" class="poster template-1">
                <div class="poster-title" id="posterTitle"></div>
                <div class="poster-slogan" id="posterSlogan"></div>
                <div class="poster-palette" id="posterPalette"></div>
            </div>
            <button id="downloadBtn" class="btn btn-download">⬇️ Télécharger en PDF</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
