<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AffichIA - Générateur d'affiches</title>
    >
</head>
<body>
    <div class="container">
        <h1>🎨 AffichIA</h1>
        <p class="subtitle">Générateur d'affiches pour événements étudiants</p>

        <div class="form-group">
            abel for="keywords">Mots-clés de l'événement :</label>
            <input type="text" id="keywords" placeholder="Ex: soirée rétro, tournoi gaming...">
        </div>

        <div class="form-group">
            abel for="style">Type d'événement :</label>
            <select id="style">
                <option value="soiree">Soirée</option>
                <option value="conference">Conférence</option>
                <option value="tournoi">Tournoi</option>
                <option value="atelier">Atelier</option>
            </select>
        </div>

        <button id="generateBtn" class="btn">Générer une affiche</button>

        <div id="result" class="result"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
